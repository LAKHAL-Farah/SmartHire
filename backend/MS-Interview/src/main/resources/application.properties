spring.application.name=MS-Interview
spring.config.import=classpath:live-mode-scripts.yml
eureka.instance.prefer-ip-address=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.enabled=false

server.port=8081
server.servlet.context-path=/interview-service

# Disable Security for development
spring.security.user.name=admin
spring.security.user.password=
management.endpoints.web.exposure.include=*
server.error.include-message=always

spring.datasource.url=jdbc:mysql://localhost:3307/interview_ms_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.main.allow-bean-definition-overriding=true

# Swagger/OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Security Configuration - Disable for testing
server.servlet.session.cookie.secure=false
spring.security.user.name=admin
spring.security.user.password=admin



# NVIDIA NIM API
nvidia.api.key=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
nvidia.api.base-url=https://integrate.api.nvidia.com/v1
nvidia.api.model=meta/llama-3.3-70b-instruct
