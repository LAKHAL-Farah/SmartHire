spring.application.name=MS-Interview-Test

server.port=0
server.servlet.context-path=

eureka.client.enabled=false

spring.datasource.url=jdbc:h2:mem:msinterview_test;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

spring.main.allow-bean-definition-overriding=true

nvidia.api.key=test-key
nvidia.api.base-url=http://localhost/fake
nvidia.api.model=test-model
nvidia.api.max-tokens=200
nvidia.api.temperature=0.1
nvidia.api.top-p=0.7
nvidia.api.connect-timeout-ms=500
nvidia.api.read-timeout-ms=500

whisper.executable.path=./tools/whisper/whisper-cli.exe
whisper.model.path=./tools/whisper/models/ggml-base.en.bin
whisper.temp.dir=./temp/whisper-audio

elevenlabs.api.key=test-elevenlabs-key
elevenlabs.api.base-url=https://api.elevenlabs.io/v1
elevenlabs.voice.id=21m00Tcm4TlvDq8ikWAM
elevenlabs.model.id=eleven_turbo_v2_5
elevenlabs.timeout.connect=5000
elevenlabs.timeout.read=15000

kokoro.python.executable=python
kokoro.script.path=./tools/kokoro/tts.py
kokoro.audio.dir=./temp/tts-audio

judge0.base-url=http://localhost:2358
