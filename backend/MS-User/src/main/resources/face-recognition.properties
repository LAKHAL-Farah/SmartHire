# Face Recognition MFA Configuration

# ============================================================
# Face Recognition Service Integration
# ============================================================

# Base URL of external Face Recognition AI service (Python microservice)
# Example: http://localhost:5050, http://face-api.company.com
face.recognition.service.url=http://localhost:5050

# REST endpoint for face verification (compare two faces)
face.recognition.verify.endpoint=/verify

# REST endpoint for face registration (generate embedding from new face)
face.recognition.register.endpoint=/register

# Confidence threshold for face matching (0.0 to 1.0)
# Faces with confidence score below this are rejected
# Typical range: 0.75-0.95 (higher = more strict)
face.recognition.confidence.threshold=0.85

# HTTP connection timeout in milliseconds
face.recognition.service.timeout.connect=10000

# HTTP read timeout in milliseconds
face.recognition.service.timeout.read=30000

# Max retry attempts if face service is temporarily unavailable
face.recognition.max.retries=3

# Delay between retry attempts in milliseconds
face.recognition.retry.delay.ms=1000

# ============================================================
# Face Verification Token Configuration
# ============================================================

# Temporary token expiration time in seconds
# Users must complete face verification within this time
# Typical range: 30-60 seconds
face.verification.token.expires.seconds=45

# Maximum verification attempts per temporary token
# After exceeding this, token is invalidated and user must restart login
face.verification.token.max.attempts=3

# Prevent multiple active tokens for same user
# If true, new token request revokes old active token
face.verification.prevent.duplicate.tokens=false

# ============================================================
# Security Settings
# ============================================================

# Enable HTTPS-only communication with face service
# Set to true in production
face.recognition.use.https=true

# Validate SSL certificates when calling face service
# Set to true in production
face.recognition.validate.ssl=true

# Store face embeddings in secure vault instead of database
# Options: DATABASE, VAULT, REDIS
face.embeddings.storage.type=DATABASE
