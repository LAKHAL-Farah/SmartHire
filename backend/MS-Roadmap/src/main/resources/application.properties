spring.application.name=MS-Roadmap

# Server config
server.port=8083
# Only keep this if you specifically want the extra prefix in your URLs
server.servlet.context-path=/msroadmap

# DB Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/msroadmap?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=

# JPA Configuration
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

# Eureka Discovery
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# Fix for 500 error on api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# This tells swagger to look inside your context path
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# NVIDIA API Configuration
nvidia.api.key=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
nvidia.api.url=https://integrate.api.nvidia.com/v1
nvidia.model.id=nvidia/nemotron-3-super-120b-a12b
nvidia.max-tokens=4096
nvidia.temperature=0.3
nvidia.reasoning-budget=4096

udemy.api.key=${UDEMY_API_KEY:}
coursera.api.key=${COURSERA_API_KEY:}
youtube.api.key=${YOUTUBE_API_KEY:}

# CORS configuration
app.cors.allowed-origin-patterns=http://localhost:4200,http://localhost:8887,http://localhost:*,http://127.0.0.1:*,http://192.168.*:*

# Frontend URL used for share links
app.frontend.base-url=${FRONTEND_BASE_URL:http://localhost:4200}

# Local dev helper disabled: dedicated demo user seeding handles roadmap creation.
app.seed.test-user.enabled=false