spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${TEST_DB_URL:${DB_URL:jdbc:mysql://localhost:3307/profile_ms_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}}
    username: ${TEST_DB_USERNAME:${DB_USERNAME:root}}
    password: ${TEST_DB_PASSWORD:${DB_PASSWORD:}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

app:
  storage:
    base-path: ./target/test-uploads
  nvidia:
    api-key: test-key-not-real
    base-url: http://localhost:9999/v1
    model: meta/llama-3.3-70b-instruct
    max-tokens: 2048
    temperature: 0.2
    top-p: 0.7
    timeout-seconds: 10
  openai:
    enabled: false
    api-key: test-key
    base-url: http://localhost:9999/v1
    model: gpt-4o
    max-tokens: 2000
    timeout-seconds: 10
