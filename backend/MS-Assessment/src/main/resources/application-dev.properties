# Local dev without MySQL: in-memory H2, Eureka off.
# Run: mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#
# Port already in use on 8084: stop the other Java process, or run with
#   -Dserver.port=8085
# or set environment variable SERVER_PORT=8085

spring.datasource.url=jdbc:h2:mem:assessment_dev;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

eureka.client.enabled=false
spring.cloud.discovery.enabled=false

smarthire.assessment.auto-release-results=false

# Keep false until MS-User implements POST smarthire.integration.user-service.path
smarthire.integration.user-service.enabled=false
smarthire.integration.user-service.base-url=http://localhost:8082
smarthire.integration.user-service.lookup-enabled=true

logging.level.org.hibernate.SQL=warn
