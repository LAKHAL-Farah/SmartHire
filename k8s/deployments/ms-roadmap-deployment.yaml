apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-roadmap
  namespace: smarthire
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-roadmap
  template:
    metadata:
      labels:
        app: ms-roadmap
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: ms-roadmap
          image: your-registry/ms-roadmap:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: ms-roadmap-config
            - secretRef:
                name: smarthire-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
