<div class="auth-layout">
  <div class="auth-layout__left">
    <app-auth-left-panel />
  </div>

  <div class="auth-layout__right">
    <div class="auth-form-card">
      <div class="auth-form-card__header">
        <h1 class="auth-form-card__title">Réinitialiser le mot de passe</h1>
        <p class="auth-form-card__subtitle">Saisissez le code et votre nouveau mot de passe.</p>
      </div>

      <form class="auth-form" (ngSubmit)="onSubmit()" novalidate>
       
        <div *ngIf="successMsg" class="auth-success">{{ successMsg }}</div>

        <div class="form-field" [class.form-field--error]="codeTouched && !isCodeValid()">
          <label class="form-field__label" for="code">Code de réinitialisation (6 chiffres)</label>
          <div class="form-field__input-wrap">
            <input id="code" type="text" maxlength="6" class="form-field__input" placeholder="123456"
              [(ngModel)]="code" name="code" (blur)="codeTouched = true" />
          </div>
          <p *ngIf="codeTouched && !isCodeValid()" class="form-field__error">Entrez un code valide à 6 chiffres</p>
        </div>

        <div class="form-field" [class.form-field--error]="newTouched && !isPasswordValid()">
          <label class="form-field__label" for="newPassword">Nouveau mot de passe</label>
          <div class="form-field__input-wrap">
            <input id="newPassword" type="password" class="form-field__input" placeholder="Nouveau mot de passe"
              [(ngModel)]="newPassword" name="newPassword" (blur)="newTouched = true" />
          </div>
          <p *ngIf="newTouched && !isPasswordValid()" class="form-field__error">Mot de passe trop court</p>
        </div>

        <div class="form-field" [class.form-field--error]="confirmTouched && newPassword !== confirmPassword">
          <label class="form-field__label" for="confirmPassword">Confirmez le mot de passe</label>
          <div class="form-field__input-wrap">
            <input id="confirmPassword" type="password" class="form-field__input" placeholder="Confirmez le mot de passe"
              [(ngModel)]="confirmPassword" name="confirmPassword" (blur)="confirmTouched = true" />
          </div>
          <p *ngIf="confirmTouched && newPassword !== confirmPassword" class="form-field__error">Les mots de passe ne correspondent pas</p>
        </div>

        <button type="submit" class="auth-submit-btn" [disabled]="isLoading()">
          <span *ngIf="isLoading()" class="auth-submit-btn__spinner"></span>
          Réinitialiser le mot de passe
        </button>
      </form>

      <p class="auth-form-card__footer">
        <a routerLink="/login" class="auth-link">Retour à la connexion</a>
      </p>
    </div>
  </div>
</div>
