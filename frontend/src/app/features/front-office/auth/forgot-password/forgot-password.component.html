<div class="auth-layout">
  <div class="auth-layout__left">
    <app-auth-left-panel />
  </div>

  <div class="auth-layout__right">
    <div class="auth-form-card">
      <div class="auth-form-card__header">
        <h1 class="auth-form-card__title">Mot de passe oublié</h1>
        <p class="auth-form-card__subtitle">Entrez votre e-mail pour recevoir un code de réinitialisation.</p>
      </div>

      <form class="auth-form" (ngSubmit)="onSubmit()" novalidate>
        <div *ngIf="errorMsg" class="auth-error">{{ errorMsg }}</div>
        <div *ngIf="successMsg" class="auth-success">{{ successMsg }}</div>

        <div class="form-field" [class.form-field--error]="emailTouched && !isEmailValid()">
          <label class="form-field__label" for="email">Adresse e-mail</label>
          <div class="form-field__input-wrap">
            <lucide-icon class="form-field__icon" name="mail" [size]="18"></lucide-icon>
            <input id="email" type="email" class="form-field__input" placeholder="votre@email.com"
              [(ngModel)]="email" name="email" (blur)="emailTouched = true" autocomplete="email" />
          </div>
          <p *ngIf="emailTouched && !isEmailValid()" class="form-field__error">Veuillez entrer un email valide</p>
        </div>

        <button type="submit" class="auth-submit-btn" [disabled]="isLoading()">
          <span *ngIf="isLoading()" class="auth-submit-btn__spinner"></span>
          Envoyer le code
        </button>
      </form>

      <p class="auth-form-card__footer">
        <a routerLink="/login" class="auth-link">Retour à la connexion</a>
      </p>
    </div>
  </div>
</div>
