<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SmartHire — AI-Powered Career Platform</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function () {
      var root = document.documentElement;
      var palette = localStorage.getItem('theme-palette') || 'original';
      var mode = localStorage.getItem('theme-mode') || 'dark';
      root.setAttribute('data-theme', palette);
      root.setAttribute('data-mode', mode);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
