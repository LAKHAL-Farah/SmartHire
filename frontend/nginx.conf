server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain application/javascript application/json text/css application/xml;
    gzip_min_length 256;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://gateway:8887;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth/ {
        proxy_pass http://gateway:8887;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /interview-service/ {
        proxy_pass http://gateway:8887;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /assets/config.json {
        alias /usr/share/nginx/html/assets/config.json;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|ttf|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
